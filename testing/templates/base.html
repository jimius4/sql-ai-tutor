<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SQL AI Tutor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .app-shell {
            max-width: 1120px;
        }

        .navbar-brand {
            letter-spacing: 0;
        }

        .surface {
            background: #ffffff;
            border: 1px solid #dee4ef;
            border-radius: 8px;
        }

        .metric {
            min-height: 112px;
        }

        .question-option {
            border: 1px solid #d8deea;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color .15s ease, background .15s ease;
        }

        .question-option:hover {
            border-color: #5b7cfa;
            background: #f7f9ff;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container app-shell">
        <a class="navbar-brand fw-semibold" href="{% url 'home' %}">SQL AI Tutor</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-primary btn-sm" href="{% url 'home' %}">Новый тест</a>
            <a class="btn btn-primary btn-sm" href="{% url 'statistics' %}">Статистика</a>
        </div>
    </div>
</nav>

<main class="container app-shell py-4 py-lg-5">
    {% if messages %}
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags|default:'info' }}{% endif %} mb-4">{{ message }}</div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
